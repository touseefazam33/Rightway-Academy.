content:
  - id: website_data
    label: "Website Visual Dashboard"
    type: file
    path: data.json
    fields:
      - id: site_title
        label: "Google SEO Title Tag"
        type: string
      - id: meta_description
        label: "Google SEO Meta Description"
        type: string
      - id: adsense_id
        label: "Google AdSense ID"
        type: string
      - id: analytics_id
        label: "Google Analytics ID"
        type: string
      - id: sheets_url
        label: "Google Sheets Script URL"
        type: string
      - id: amc_title
        label: "AMC Section Title"
        type: string
      - id: amc_subtitle
        label: "AMC Section Subtitle"
        type: string